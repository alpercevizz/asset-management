# AssetMan — production docker-compose
# Kurulum:
#   SQLite (varsayılan, tek servis app+caddy):
#     docker compose up -d
#   PostgreSQL (Pro/Enterprise, ekstra db servisi):
#     docker compose --profile postgres up -d
#
# DATABASE_URL .env'de tanımlanır:
#   sqlite:./data/assetman.db              (varsayılan — postgres profile'ı çalıştırmayın)
#   postgres://assetman:${DB_PASSWORD}@db:5432/assetman   (postgres profile ile)

services:
  app:
    build: .
    image: assetman:latest
    container_name: assetman-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - assetman-data:/app/data
      # WORM ayrı volume: erişim alanı ayrılabilir, ideali farklı host'a mount
      - assetman-worm:/app/data/worm-repository
    # Dışarıya port AÇMAYIN — Caddy proxy'ler.
    expose:
      - "3000"
    networks:
      - assetman
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Postgres profili aktifse DB hazır olmadan başlama.
    # SQLite modunda db servisi hiç oluşmaz — required:false ile bu bağımlılık atlanır (Compose v2.20+).
    depends_on:
      db:
        condition: service_healthy
        required: false

  caddy:
    image: caddy:2-alpine
    container_name: assetman-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data     # otomatik cert store (Let's Encrypt)
      - caddy-config:/config
    environment:
      # .env'ye ASSETMAN_HOST=envanter.sirket.com ekleyin (Let's Encrypt için)
      # ASSETMAN_HOST boşsa Caddy :80'de HTTP servis eder (dev/lokal test).
      ASSETMAN_HOST: ${ASSETMAN_HOST:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - assetman

  # ── PostgreSQL (opsiyonel — profil ile açılır) ──────────────────────────────
  # `docker compose --profile postgres up -d` ile aktifleşir.
  # .env'de DATABASE_URL=postgres://assetman:${DB_PASSWORD}@db:5432/assetman olmalı.
  # Portal DIŞARIYA açık DEĞİL — sadece uygulama container'ından erişilir.
  db:
    image: postgres:16-alpine
    container_name: assetman-db
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assetman}
      POSTGRES_USER: ${POSTGRES_USER:-assetman}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD .env'de tanımlı olmalı}
    volumes:
      - assetman-db:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - assetman
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assetman} -d ${POSTGRES_DB:-assetman}"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  assetman:
    driver: bridge

volumes:
  assetman-data:
  assetman-worm:
  assetman-db:      # Postgres profili ile kullanılır
  caddy-data:
  caddy-config:
