<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Cihaz Kaydı — AssetMan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-display: "Fraunces", Georgia, serif;
      --font-body: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --bg: #faf7f2; --card: #ffffff; --field: #faf7f2;
      --border: rgba(24,20,15,0.10); --border-strong: rgba(24,20,15,0.16);
      --text: #1a1815; --text-dim: #5a544c; --text-muted: #8a8378;
      --accent: #6b5cff; --green: #0f9866; --red: #c94a3f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1613; --card: #221e1a; --field: #1a1613;
        --border: rgba(255,248,238,0.09); --border-strong: rgba(255,248,238,0.16);
        --text: #f2ede4; --text-dim: #b3ab9f; --text-muted: #7a7469;
        --accent: #a99bff; --green: #4ade80; --red: #f87171;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background:
        radial-gradient(700px 400px at 0% -10%, rgba(107,92,255,0.10), transparent 55%),
        radial-gradient(700px 400px at 100% 0%, rgba(244,182,120,0.12), transparent 50%),
        var(--bg);
      color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.55;
      letter-spacing: -0.006em; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 460px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    .hdr { padding: 34px 24px 22px; border-bottom: 1px solid var(--border); }
    .hdr-brand { display: flex; align-items: center; gap: 11px; }
    .hdr-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), #8a7dff); border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(107,92,255,0.28); }
    .hdr-icon svg { width: 19px; height: 19px; stroke: #fff; fill: none; stroke-width: 1.8; }
    .hdr-name { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }
    .hdr-sub { font-size: 11px; color: var(--text-muted); }
    .hdr-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; margin-top: 20px; letter-spacing: -0.01em; color: var(--text); }
    .hdr-desc { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

    form { padding: 22px 24px 34px; display: flex; flex-direction: column; gap: 15px; flex: 1; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .field label .req { color: var(--red); }
    input, select {
      width: 100%; background: var(--field); border: 1px solid var(--border-strong); color: var(--text);
      border-radius: 11px; padding: 13px 14px; font-size: 16px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none; appearance: none; font-family: inherit;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(107,92,255,0.12); }
    select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238a8378' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 38px; }
    .hint { font-size: 11px; color: var(--text-muted); }
    .auto-tag { display: inline-block; background: rgba(107,92,255,0.12); color: var(--accent); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; margin-left: 6px; }

    .btn {
      background: var(--text); color: var(--bg); border: none;
      border-radius: 11px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px;
      font-family: inherit; letter-spacing: -0.01em; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.55; }

    .ok-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; text-align: center; gap: 16px; }
    .ok-circle { width: 76px; height: 76px; border-radius: 50%; background: rgba(15,152,102,0.12); display: flex; align-items: center; justify-content: center; }
    .ok-circle svg { width: 38px; height: 38px; stroke: var(--green); fill: none; stroke-width: 2.5; }
    .ok-title { font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--text); }
    .ok-desc { font-size: 14px; color: var(--text-muted); }
    .ok-add { background: var(--card); border: 1px solid var(--border-strong); color: var(--text-dim); padding: 11px 20px; border-radius: 11px; font-size: 14px; cursor: pointer; font-family: inherit; }

    .err-box { display: none; background: rgba(201,74,63,0.10); border: 1px solid rgba(201,74,63,0.25); color: var(--red); padding: 11px 14px; border-radius: 11px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hdr">
      <div class="hdr-brand">
        <div class="hdr-icon">
          <svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>
        </div>
        <div>
          <div class="hdr-name">AssetMan</div>
          <div class="hdr-sub">IT Asset Management</div>
        </div>
      </div>
      <div class="hdr-title">Cihaz Kaydı</div>
      <div class="hdr-desc">Bu cihazı envantere eklemek için bilgileri doldurun.</div>
    </div>

    <form id="regForm">
      <div class="err-box" id="errBox"></div>

      <div class="field">
        <label>Cihaz Kategorisi <span class="req">*</span><span class="auto-tag" id="catAuto" style="display:none">otomatik</span></label>
        <select id="category" required>
          <option value="Telefon">📱 Telefon</option>
          <option value="Tablet">📲 Tablet</option>
          <option value="El Terminali">📟 El Terminali</option>
          <option value="Bilgisayar">💻 Bilgisayar</option>
          <option value="Sunucu">🖥️ Sunucu</option>
          <option value="Yazıcı">🖨️ Yazıcı</option>
          <option value="Ağ Aygıtı">🌐 Ağ Aygıtı</option>
          <option value="Çevre Aygıtı">🖱️ Çevre Aygıtı</option>
          <option value="Diğer">Diğer</option>
        </select>
      </div>

      <div class="field">
        <label>Cihaz Adı <span class="req">*</span></label>
        <input type="text" id="hostname" placeholder="Örn: SATIS-TELEFON-01" required />
        <span class="hint">Cihazı tanımlayan benzersiz bir ad.</span>
      </div>

      <div class="field">
        <label>Marka</label>
        <input type="text" id="brand" placeholder="Örn: Apple, Samsung, Zebra" />
      </div>

      <div class="field">
        <label>Model</label>
        <input type="text" id="model" placeholder="Örn: iPhone 15, Galaxy Tab S9" />
      </div>

      <div class="field">
        <label>Seri No / IMEI</label>
        <input type="text" id="serial_number" placeholder="Cihazın seri numarası" />
      </div>

      <div class="field">
        <label>İşletim Sistemi <span class="auto-tag" id="osAuto" style="display:none">otomatik</span></label>
        <input type="text" id="os" placeholder="Örn: iOS 17, Android 14" />
      </div>

      <div class="field">
        <label>Kullanıcı</label>
        <input type="text" id="username" placeholder="Cihazı kullanan kişi" />
      </div>

      <div class="field">
        <label>Lokasyon</label>
        <input type="text" id="location" placeholder="Örn: Depo, Satış, Merkez Ofis" />
      </div>

      <button type="submit" class="btn" id="submitBtn">Cihazı Kaydet</button>
    </form>

    <div class="ok-screen" id="okScreen">
      <div class="ok-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="ok-title">Cihaz Kaydedildi</div>
      <div class="ok-desc" id="okDesc">Cihaz başarıyla envantere eklendi.</div>
      <button class="ok-add" id="addAnother">Başka Cihaz Ekle</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const $ = (id) => document.getElementById(id);

    // ── Ön-doldurma (IT'nin QR'a gömdüğü değerler) ──
    ['location', 'username', 'category', 'hostname', 'brand', 'model'].forEach((k) => {
      const v = params.get(k);
      if (v && $(k)) $(k).value = v;
    });

    // ── Cihaz tipini/OS'u User-Agent'tan tahmin et ──
    (function autodetect() {
      const ua = navigator.userAgent;
      let cat = null, brand = null, os = null;

      if (/iPhone/.test(ua)) { cat = 'Telefon'; brand = 'Apple'; os = 'iOS'; }
      else if (/iPad/.test(ua)) { cat = 'Tablet'; brand = 'Apple'; os = 'iPadOS'; }
      else if (/Android/.test(ua)) {
        cat = /Mobile/.test(ua) ? 'Telefon' : 'Tablet';
        const m = ua.match(/Android\s+([\d.]+)/);
        os = m ? 'Android ' + m[1] : 'Android';
        // Bazı UA'larda model adı bulunur (örn: SM-S928B → Samsung)
        if (/SM-|SAMSUNG/i.test(ua)) brand = 'Samsung';
        else if (/Pixel/i.test(ua)) brand = 'Google';
        else if (/HUAWEI/i.test(ua)) brand = 'Huawei';
        else if (/Xiaomi|Redmi|POCO/i.test(ua)) brand = 'Xiaomi';
      }
      else if (/Windows|Macintosh|Linux/.test(ua)) {
        cat = 'Bilgisayar';
        os = /Windows/.test(ua) ? 'Windows' : /Macintosh/.test(ua) ? 'macOS' : 'Linux';
      }

      // Yalnızca IT ön-doldurmadıysa otomatik değeri uygula
      if (cat && !params.get('category')) { $('category').value = cat; $('catAuto').style.display = 'inline-block'; }
      if (os && !$('os').value)           { $('os').value = os;       $('osAuto').style.display = 'inline-block'; }
      if (brand && !$('brand').value)      { $('brand').value = brand; }
    })();

    // ── Gönder ──
    $('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('submitBtn');
      const err = $('errBox');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Kaydediliyor...';

      const payload = {
        category:      $('category').value,
        hostname:      $('hostname').value.trim(),
        brand:         $('brand').value.trim(),
        model:         $('model').value.trim(),
        serial_number: $('serial_number').value.trim(),
        os:            $('os').value.trim(),
        username:      $('username').value.trim(),
        location:      $('location').value.trim(),
      };

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error || 'Kayıt başarısız');

        $('okDesc').textContent = data.action === 'updated'
          ? payload.hostname + ' bilgileri güncellendi.'
          : payload.hostname + ' envantere eklendi.';
        $('regForm').style.display = 'none';
        $('okScreen').style.display = 'flex';
      } catch (ex) {
        err.textContent = 'Hata: ' + ex.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cihazı Kaydet';
      }
    });

    $('addAnother').addEventListener('click', () => {
      ['hostname', 'brand', 'model', 'serial_number', 'username'].forEach((k) => { if (!params.get(k)) $(k).value = ''; });
      $('okScreen').style.display = 'none';
      $('regForm').style.display = 'flex';
      window.scrollTo(0, 0);
    });
  </script>
</body>
</html>
